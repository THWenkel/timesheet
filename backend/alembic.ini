# =============================================================================
# backend/alembic.ini
#
# Alembic configuration for ORM-driven schema migrations.
#
# The database URL is intentionally left as a placeholder here.
# The actual URL is built dynamically in alembic/env.py using
# the application settings (pydantic-settings / .env).
#
# Usage:
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic history
# =============================================================================

[alembic]
# Path to migration scripts
script_location = alembic

# Template for new migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Truncate long slug (description) in filename
truncate_slug_length = 40

# The SQLAlchemy URL is built dynamically in env.py — this line is unused
# but Alembic requires the key to exist in the ini file
sqlalchemy.url = mssql+pyodbc://placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
